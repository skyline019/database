name: newdb-ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly soak window (UTC Monday 12:00); optional heavy tests gated by env in repo.
    - cron: "0 12 * * 1"

jobs:
  c-api-abi-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate C API ABI and symbol surface
        run: python3 newdb/scripts/validate/check_c_api_abi.py --expected-abi 1

  observability-schema-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate perf summary schema contract
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          p = pathlib.Path("newdb/scripts/results/ci_sample_perf_summary.json")
          p.parent.mkdir(parents=True, exist_ok=True)
          p.write_text(
              json.dumps(
                  {
                      "schema_version": "newdb.perf_summary.v1",
                      "timestamp": "2026-04-24T00:00:00Z",
                      "data_dir": "ci://sample",
                      "table": "qa_regression",
                      "perf": {
                          "txn_normal_avg_ms": 1.0,
                          "query_avg_ms_max": 2.0,
                          "where_policy_rejects": 0,
                          "where_policy_fallbacks": 0,
                      },
                  }
              ),
              encoding="utf-8",
          )
          PY
          python3 newdb/scripts/validate/validate_perf_summary.py newdb/scripts/results/ci_sample_perf_summary.json

  telemetry-schema-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate telemetry JSONL contract
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          p = pathlib.Path("newdb/scripts/results/ci_sample_telemetry.jsonl")
          p.parent.mkdir(parents=True, exist_ok=True)
          events = [
              {
                  "schema_version": "newdb.telemetry.v1",
                  "timestamp": "2026-04-24T00:00:00Z",
                  "run_id": "testloop_20260424_000000",
                  "source": "test_loop",
                  "env": "ci",
                  "build": "build-ci",
                  "profile": "gate",
                  "phase": "prep",
                  "metrics": {"bench_prep_rows": 1000, "bench_prep_chunk_size": 500},
              },
              {
                  "schema_version": "newdb.telemetry.v1",
                  "timestamp": "2026-04-24T00:00:01Z",
                  "run_id": "testloop_20260424_000000",
                  "source": "test_loop",
                  "env": "ci",
                  "build": "build-ci",
                  "profile": "gate",
                  "phase": "summary",
                  "metrics": {"summary_path": "scripts/results/test_loop_summary.json"},
              },
          ]
          p.write_text("\n".join(json.dumps(x) for x in events) + "\n", encoding="utf-8")
          PY
          python3 newdb/scripts/validate/validate_telemetry_event.py newdb/scripts/results/ci_sample_telemetry.jsonl

  runtime-stats-schema-gate:
