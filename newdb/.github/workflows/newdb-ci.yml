                      "wal_group_commit_count": 0,
                      "wal_group_commit_batch_commits": 0,
                      "wal_group_commit_pending_commits": 0,
                      "txn_commit_count": 0,
                      "txn_commit_p95_ms": 0,
                      "txn_commit_max_ms": 0,
                      "wal_bytes_since_start": 0,
                      "wal_bytes_per_commit_avg": 0,
                      "lock_wait_p95_ms": 0,
                      "scheduler_throttle_count": 0,
                      "hot_index_enabled": True,
