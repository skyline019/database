  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ pkg-config libcrc32c-dev python3

      - name: Configure (clean build dir)
        run: cmake -S newdb -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Runtime report compact gate regression
        run: >
          python3 newdb/scripts/validate/test_runtime_report_compact_gates.py
          build/newdb_runtime_report

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Bench gate (smoke + microbench)
        run: >
          python3 newdb/scripts/ci/ci_bench_gate.py build
          --max-vacuum-compact-failure-delta 0
          --max-vacuum-queue-depth-peak 8
          --max-wal-recovery-last-elapsed-ms 2000
          --max-lock-deadlock-detect-delta 0
          --max-lock-deadlock-victim-delta 0
          --max-lock-wait-max-ms-delta 5000
          --max-lsm-segment-count 8
          --min-lsm-memtable-flush-delta 0
          --max-lsm-read-segments-scanned-p95 8
          --min-lsm-compaction-bytes-amp-efficiency 0.2

  linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang pkg-config libcrc32c-dev python3

      - name: Configure
        env:
          CXX: clang++
        run: cmake -S newdb -B build-clang -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build and test
        run: |
          cmake --build build-clang --parallel
          ctest --test-dir build-clang --output-on-failure

      - name: Bench gate (smoke + microbench)
        run: >
          python3 newdb/scripts/ci/ci_bench_gate.py build-clang
          --max-vacuum-compact-failure-delta 0
          --max-vacuum-queue-depth-peak 8
          --max-wal-recovery-last-elapsed-ms 2000
          --max-lock-deadlock-detect-delta 0
          --max-lock-deadlock-victim-delta 0
          --max-lock-wait-max-ms-delta 5000
          --max-lsm-segment-count 8
          --min-lsm-memtable-flush-delta 0
          --max-lsm-read-segments-scanned-p95 8
          --min-lsm-compaction-bytes-amp-efficiency 0.2

  windows-clean-room:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify clean-room configure/build/test
        shell: pwsh
        run: >
          .\newdb\scripts\ci\verify_clean_reconfigure.ps1
          -BuildDir build_ci_windows
          -Generator "Visual Studio 17 2022"
          -BuildConfig RelWithDebInfo
