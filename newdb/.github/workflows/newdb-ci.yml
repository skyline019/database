                      "normal_interval_ms": 20,
                      "autovacuum": True,
                      "vacuum_ops_threshold": 25,
                      "vacuum_min_interval_sec": 0,
                      "vacuum_trigger_count": 2,
                      "vacuum_execute_count": 2,
                      "vacuum_cooldown_skip_count": 0,
                      "vacuum_compact_success_count": 2,
                      "vacuum_compact_failure_count": 0,
                      "vacuum_compact_bytes_reclaimed": 4096,
                      "vacuum_compact_last_elapsed_ms": 8,
