                      "wal_recovery_finalize_ms": 1,
                      "wal_recovery_records_scanned": 10,
                      "wal_recovery_dangling_txns": 0,
                      "wal_group_commit_count": 1,
                      "wal_group_commit_batch_commits": 2,
                      "wal_group_commit_pending_commits": 0,
                      "txn_commit_count": 1,
                      "txn_commit_p95_ms": 1,
                      "txn_commit_max_ms": 1,
