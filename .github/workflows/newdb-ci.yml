name: newdb

on:
  push:
    paths:
      - "newdb/**"
      - "waterfall/**"
      - ".github/workflows/newdb-ci.yml"
      - ".github/workflows/newdb-ci-reusable.yml"
      - "newdb/.github/workflows/**"
  pull_request:
    paths:
      - "newdb/**"
      - "waterfall/**"
      - ".github/workflows/newdb-ci.yml"
      - ".github/workflows/newdb-ci-reusable.yml"
      - "newdb/.github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  reusable-ci:
    # Same-repo relative reusable: no @ref allowed (uses caller commit’s file).
    uses: ./.github/workflows/newdb-ci-reusable.yml
