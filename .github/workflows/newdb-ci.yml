name: newdb

on:
  push:
    paths:
      - "newdb/**"
      - "waterfall/**"
      - ".github/workflows/newdb-ci.yml"
      - ".github/workflows/newdb-ci-reusable.yml"
      - "newdb/.github/workflows/**"
  pull_request:
    paths:
      - "newdb/**"
      - "waterfall/**"
      - ".github/workflows/newdb-ci.yml"
      - ".github/workflows/newdb-ci-reusable.yml"
      - "newdb/.github/workflows/**"
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

jobs:
  reusable-ci:
    # Reusable workflow refs must be literal (no ${{ }}); pin to default branch.
    uses: ./.github/workflows/newdb-ci-reusable.yml@main
